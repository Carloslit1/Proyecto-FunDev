services:
  # ============================================================
  # LANDING - Sitio público (Internet)  → Puerto 8080
  # ============================================================
  landing:
    build: ./landing
    container_name: doggiechic_landing
    ports:
      - "8080:80"
    networks:
      - publica
    restart: unless-stopped

  # ============================================================
  # INTRANET - Panel interno privado    → Puerto 8081
  # ============================================================
  intranet:
    build: ./intranet
    container_name: doggiechic_intranet
    ports:
      - "8081:80"
    networks:
      - privada
    restart: unless-stopped

  # ============================================================
  # BACKEND - API Node.js/Express       → Puerto 3000
  # ============================================================
  backend:
    build: ./backend
    container_name: doggiechic_backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_URI: mongodb://mongo:27017/doggiechic
    networks:
      - privada
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      - mongo
    restart: unless-stopped

  # ============================================================
  # MONGODB - Base de datos             → Puerto 27017
  # ============================================================
  mongo:
    image: mongo:6
    container_name: doggiechic_mongo
    ports:
      - "27017:27017"
    networks:
      - privada
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

networks:
  publica:
  privada:

volumes:
  mongodb_data:
